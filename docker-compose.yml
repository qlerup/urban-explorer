services:
  db:
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: urbanexplorer
      POSTGRES_USER: urbanexplorer
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: ${TZ:-Europe/Copenhagen}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urbanexplorer -d urbanexplorer"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    container_name: urban-explorer
    build:
      context: ./app
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3001}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://urbanexplorer:${DB_PASSWORD}@db:5432/urbanexplorer
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      MAPTILER_KEY: ${MAPTILER_KEY:-}
      NODE_ENV: production
      TZ: ${TZ:-Europe/Copenhagen}
      FJORDHUB_URL: ${FJORDHUB_URL:-}
      FJORDHUB_APP_ID: ${FJORDHUB_APP_ID:-urban-explorer}
      FJORDHUB_API_KEY: ${FJORDHUB_API_KEY:-}
    volumes:
      - ${UPLOADS_HOST_DIR:-uploads_data}:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
